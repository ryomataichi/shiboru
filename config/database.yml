# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem 'sqlite3'
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary:
    <<: *default
    database: shiboru_test_development
    migrations_paths: db/migrate

  queue:
    <<: *default
    database: shiboru_test_development_queue
    migrations_paths: db/queue_migrate

test:
  primary:
    <<: *default
    database: shiboru_test_test
    migrations_paths: db/migrate

  queue:
    <<: *default
    database: shiboru_test_test_queue
    migrations_paths: db/queue_migrate

production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>

  queue:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>